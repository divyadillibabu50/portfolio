<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            background: url('your-background.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .button {
            font-size: 24px;
            padding: 15px 40px;
            background: rgb(94, 201, 237);
            color: black;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }
        
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>

    <button class="button" onclick="goToHome()">Click Here</button>

    <script>
        function goToHome() {
            window.location.href = "home.html";
        }
    </script>
</body>

</html>
